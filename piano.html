<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABC 피아노 — 연주하고 악보로 저장</title>
<style>
  :root {
    --ink: #1c2b3a; --ink-soft: #46586b;
    --paper: #faf8f2; --card: #ffffff; --line: #ddd6c8;
    --brass: #b08a2e; --brass-deep: #8f6e1f; --danger: #a8503f;
    --white-key: #fdfcf8; --black-key: #1c2b3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
    background: var(--paper); color: var(--ink);
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }

  header {
    position: relative; background: var(--ink); color: #f3efe4;
    padding: 10px 16px; overflow: hidden; flex: 0 0 auto;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .staff-lines { position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; gap: 6px; opacity: .18; pointer-events: none; }
  .staff-lines span { display: block; height: 1px; background: #f3efe4; }
  header h1 { position: relative; font-size: 1.02rem; font-weight: 800; letter-spacing: .03em; white-space: nowrap; }
  header h1 .clef { color: var(--brass); font-size: 1.3rem; vertical-align: -2px; margin-right: 6px; font-weight: 400; }

  .toolbar { position: relative; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar input[type="text"] {
    width: 150px; padding: 7px 9px; font-size: .85rem; font-family: inherit;
    border: 1px solid rgba(243,239,228,.35); border-radius: 7px;
    background: rgba(255,255,255,.1); color: #f3efe4;
  }
  .toolbar input::placeholder { color: rgba(243,239,228,.5); }
  .toolbar label { font-size: .75rem; color: #c9c2b0; }
  .toolbar input[type="number"] {
    width: 62px; padding: 7px 6px; font-size: .85rem; font-family: inherit;
    border: 1px solid rgba(243,239,228,.35); border-radius: 7px;
    background: rgba(255,255,255,.1); color: #f3efe4; text-align: center;
  }
  button {
    appearance: none; border: none; cursor: pointer;
    padding: 8px 14px; border-radius: 8px;
    font-size: .85rem; font-weight: 700; font-family: inherit;
    transition: transform .05s ease;
  }
  button:active { transform: scale(.96); }
  .btn-brass { background: var(--brass); color: #fff; }
  .btn-rec { background: var(--danger); color: #fff; }
  .btn-rec.on { animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  .btn-ghost { background: transparent; color: #e8e2d2; border: 1px solid rgba(243,239,228,.4); }

  #status {
    flex: 0 0 auto; padding: 6px 16px; font-size: .78rem; color: var(--ink-soft);
    background: var(--card); border-bottom: 1px solid var(--line);
    min-height: 1.9em; display: flex; align-items: center; gap: 10px;
  }
  #status.error { color: var(--danger); }
  #abcPreview {
    font-family: 'Consolas', monospace; font-size: .72rem; color: var(--ink-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
  }

  /* ── 건반 ── */
  #keyboard { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 8px; min-height: 0; }
  .kb-row { flex: 1; display: flex; gap: 6px; min-height: 0; }
  .oct-ctrl {
    flex: 0 0 44px; display: flex; flex-direction: column; gap: 4px;
    align-items: stretch; justify-content: center;
  }
  .oct-ctrl button { padding: 6px 0; font-size: .8rem; background: var(--card); border: 1px solid var(--line); color: var(--ink-soft); }
  .oct-label { text-align: center; font-size: .72rem; font-weight: 700; color: var(--brass-deep); }
  .keys { position: relative; flex: 1; display: flex; border-radius: 10px; overflow: hidden;
    border: 1px solid var(--line); background: var(--card); }
  .wkey {
    flex: 1; position: relative; background: var(--white-key);
    border-right: 1px solid #d8d2c4; touch-action: none; cursor: pointer;
  }
  .wkey:last-child { border-right: none; }
  .wkey.active { background: #ead9ad; }
  .wkey .kname {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: .68rem; color: #b6ae9c; font-weight: 700; pointer-events: none;
  }
  .bkey {
    position: absolute; top: 0; height: 60%; width: 8.6%;
    background: var(--black-key); border-radius: 0 0 6px 6px;
    touch-action: none; cursor: pointer; z-index: 2;
    box-shadow: 0 3px 5px rgba(0,0,0,.35);
  }
  .bkey.active { background: var(--brass-deep); }
</style>
</head>
<body>

<header>
  <div class="staff-lines"><span></span><span></span><span></span><span></span><span></span></div>
  <h1><span class="clef">&#119070;</span>ABC 피아노</h1>
  <div class="toolbar">
    <input type="text" id="titleInput" placeholder="곡 제목 (저장 시 사용)">
    <label>BPM <input type="number" id="bpmInput" value="100" min="40" max="220"></label>
    <button id="recBtn" class="btn-rec">&#9210; 녹음</button>
    <button id="saveBtn" class="btn-brass">&#128190; .abc 저장</button>
    <button id="copyBtn" class="btn-ghost">&#128203; 복사</button>
    <button id="clearBtn" class="btn-ghost">&#128465; 지우기</button>
  </div>
</header>

<div id="status"><span id="statusMsg">건반을 눌러 소리를 확인하고, ⏺ 녹음을 누른 뒤 연주하세요. 정지하면 ABC 악보로 변환됩니다.</span><span id="abcPreview"></span></div>

<div id="keyboard">
  <div class="kb-row" id="rowHigh"></div>
  <div class="kb-row" id="rowLow"></div>
</div>

<script>
(function () {
  "use strict";

  /* ════════ 오디오 (외부 음원 불필요: Web Audio 합성) ════════ */
  var audioCtx = null;
  var voices = {}; /* midi -> {oscs, gain} */
  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }
  function freqOf(m) { return 440 * Math.pow(2, (m - 69) / 12); }
  function noteOn(m) {
    ensureAudio();
    if (voices[m]) noteOff(m, true);
    var now = audioCtx.currentTime;
    var gain = audioCtx.createGain();
    var o1 = audioCtx.createOscillator();
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o1.type = "triangle"; o1.frequency.value = freqOf(m);
    o2.type = "sine"; o2.frequency.value = freqOf(m) * 2; /* 옥타브 위 배음 */
    g2.gain.value = 0.25;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.3, now + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.16, now + 0.35); /* 피아노식 감쇠 */
    o1.connect(gain); o2.connect(g2); g2.connect(gain);
    gain.connect(audioCtx.destination);
    o1.start(now); o2.start(now);
    voices[m] = { oscs: [o1, o2], gain: gain };
  }
  function noteOff(m, instant) {
    var v = voices[m];
    if (!v) return;
    delete voices[m];
    var now = audioCtx.currentTime;
    try {
      v.gain.gain.cancelScheduledValues(now);
      v.gain.gain.setValueAtTime(Math.max(v.gain.gain.value, 0.0001), now);
      v.gain.gain.exponentialRampToValueAtTime(0.0001, now + (instant ? 0.02 : 0.12));
      v.oscs.forEach(function (o) { o.stop(now + 0.15); });
    } catch (e) {}
  }

  /* ════════ 녹음 ════════ */
  var recording = false, events = [], openNotes = {};
  var statusMsg = document.getElementById("statusMsg");
  var statusBox = document.getElementById("status");
  var preview = document.getElementById("abcPreview");
  var recBtn = document.getElementById("recBtn");
  var lastAbc = "";

  function setStatus(msg, isError) {
    statusMsg.textContent = msg;
    statusBox.className = isError ? "error" : "";
  }
  function press(m) {
    noteOn(m);
    if (recording) {
      var ev = { m: m, t0: performance.now(), t1: 0 };
      events.push(ev);
      openNotes[m] = ev;
    }
  }
  function release(m) {
    noteOff(m);
    if (recording && openNotes[m]) {
      openNotes[m].t1 = performance.now();
      delete openNotes[m];
    }
  }
  function toggleRec() {
    if (!recording) {
      recording = true;
      events = []; openNotes = {};
      recBtn.textContent = "\u23F9 정지";
      recBtn.classList.add("on");
      setStatus("녹음 중... 자유롭게 연주하세요. 정지를 누르면 악보로 변환됩니다.");
    } else {
      recording = false;
      var nowT = performance.now();
      for (var k in openNotes) { openNotes[k].t1 = nowT; }
      openNotes = {};
      recBtn.innerHTML = "&#9210; 녹음";
      recBtn.classList.remove("on");
      buildAbc();
    }
  }

  /* ════════ ABC 변환 ════════ */
  var NAMES = ["C","^C","D","^D","E","F","^F","G","^G","A","^A","B"];
  function midiToAbc(m) {
    var name = NAMES[m % 12];
    var oct = Math.floor(m / 12) - 1;
    var acc = name.charAt(0) === "^" ? "^" : "";
    var letter = name.charAt(name.length - 1);
    if (oct <= 4) {
      var commas = "";
      for (var i = oct; i < 4; i++) commas += ",";
      return acc + letter + commas;
    }
    var apos = "";
    for (var j = 6; j <= oct; j++) apos += "'";
    return acc + letter.toLowerCase() + apos;
  }
  function buildAbc() {
    var done = events.filter(function (e) { return e.t1 > e.t0; });
    if (!done.length) { setStatus("녹음된 음이 없습니다.", true); lastAbc = ""; preview.textContent = ""; return; }
    var bpm = parseInt(document.getElementById("bpmInput").value, 10) || 100;
    var eighth = 60000 / bpm / 2;
    done.sort(function (a, b) { return a.t0 - b.t0; });
    /* 80ms 이내 동시에 누른 음 = 화음으로 묶기 */
    var groups = [];
    done.forEach(function (e) {
      var g = groups[groups.length - 1];
      if (g && e.t0 - g.t0 < 80) {
        if (g.midis.indexOf(e.m) < 0) g.midis.push(e.m);
        g.t1 = Math.max(g.t1, e.t1);
      } else {
        groups.push({ t0: e.t0, t1: e.t1, midis: [e.m] });
      }
    });
    /* 양자화: 8분음표 단위 */
    var tokens = [];
    var prevEnd = groups[0].t0;
    groups.forEach(function (g) {
      var gap = Math.round((g.t0 - prevEnd) / eighth);
      if (gap >= 1) tokens.push({ rest: true, len: Math.min(gap, 8) });
      var len = Math.round((g.t1 - g.t0) / eighth);
      len = Math.max(1, Math.min(8, len));
      tokens.push({ midis: g.midis, len: len });
      prevEnd = g.t1;
    });
    /* 마디 나누기 (4/4, 마디당 8단위) — 마디 걸치는 음은 붙임줄(-)로 분할 */
    var parts = [], cell = 0, barCount = 0;
    function txtOf(t, l) {
      var L = l === 1 ? "" : String(l);
      if (t.rest) return "z" + L;
      if (t.midis.length === 1) return midiToAbc(t.midis[0]) + L;
      return "[" + t.midis.map(midiToAbc).join("") + "]" + L;
    }
    tokens.forEach(function (t) {
      var len = t.len;
      while (len > 0) {
        var room = 8 - cell;
        var use = Math.min(len, room);
        var txt = txtOf(t, use);
        if (!t.rest && len > use) txt += "-";
        parts.push(txt);
        cell += use; len -= use;
        if (cell === 8) {
          barCount++;
          parts.push(barCount % 4 === 0 ? "|\n" : "| ");
          cell = 0;
        }
      }
    });
    if (cell > 0) { parts.push("z" + (8 - cell === 1 ? "" : (8 - cell))); parts.push("| "); }
    var bodyStr = parts.join(" ").replace(/\|\s*$/, "|]").replace(/ \| /g, " | ").replace(/ \|\n /g, " |\n");
    var title = (document.getElementById("titleInput").value || "피아노 스케치").trim();
    lastAbc = "X:1\nT:" + title + "\nC:ABC Piano\nM:4/4\nL:1/8\nQ:1/4=" + bpm + "\nK:C\n" + bodyStr;
    preview.textContent = lastAbc.split("\n").slice(7).join(" ");
    setStatus("변환 완료: " + barCount + "마디 + " + (cell > 0 ? "1" : "0") + "마디 — 저장하거나 복사해서 악보 연구소에서 다듬으세요.");
  }

  /* ════════ 저장 / 복사 / 지우기 ════════ */
  async function saveAbc() {
    if (!lastAbc) { setStatus("저장할 악보가 없습니다. 녹음 후 정지를 눌러 변환부터 해주세요.", true); return; }
    var name = (document.getElementById("titleInput").value || "피아노 스케치").trim().replace(/[\\/:*?"<>|]/g, "_");
    if (window.showSaveFilePicker) {
      try {
        var handle = await window.showSaveFilePicker({
          suggestedName: name + ".abc",
          types: [{ description: "ABC notation", accept: { "text/plain": [".abc", ".txt"] } }]
        });
        var w = await handle.createWritable();
        await w.write(lastAbc); await w.close();
        setStatus("저장 완료: " + handle.name);
        return;
      } catch (e) { if (e && e.name === "AbortError") return; }
    }
    var blob = new Blob([lastAbc], { type: "text/plain;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name + ".abc";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    setStatus("기본 다운로드 폴더에 '" + name + ".abc'로 저장했습니다.");
  }
  function copyAbc() {
    if (!lastAbc) { setStatus("복사할 악보가 없습니다.", true); return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(lastAbc).then(function () {
        setStatus("클립보드에 복사했습니다 — 악보 연구소 입력창에 붙여넣으세요.");
      }, function () { setStatus("복사 실패: 브라우저 권한을 확인해주세요.", true); });
    } else { setStatus("이 브라우저는 클립보드 복사를 지원하지 않습니다.", true); }
  }
  function clearRec() {
    events = []; lastAbc = ""; preview.textContent = "";
    setStatus("기록을 지웠습니다. 새로 녹음해보세요.");
  }

  /* ════════ 건반 만들기 ════════ */
  var WHITE_OFF = [0, 2, 4, 5, 7, 9, 11];
  var BLACK_POS = [{ after: 0, off: 1 }, { after: 1, off: 3 }, { after: 3, off: 6 }, { after: 4, off: 8 }, { after: 5, off: 10 }];
  var WNAMES = ["도", "레", "미", "파", "솔", "라", "시"];
  var rows = [
    { el: document.getElementById("rowHigh"), base: 72 }, /* C5 */
    { el: document.getElementById("rowLow"), base: 60 }   /* C4 */
  ];

  function bindKey(el, getMidi) {
    var activePointers = {};
    el.addEventListener("pointerdown", function (e) {
      e.preventDefault();
      el.setPointerCapture && el.setPointerCapture(e.pointerId);
      var m = getMidi();
      activePointers[e.pointerId] = m;
      el.classList.add("active");
      press(m);
    });
    function up(e) {
      var m = activePointers[e.pointerId];
      if (m === undefined) return;
      delete activePointers[e.pointerId];
      el.classList.remove("active");
      release(m);
    }
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
    el.addEventListener("pointerleave", up);
    el.addEventListener("contextmenu", function (e) { e.preventDefault(); });
  }

  function buildRow(row) {
    row.el.innerHTML = "";
    /* 옥타브 컨트롤 */
    var ctrl = document.createElement("div");
    ctrl.className = "oct-ctrl";
    var upB = document.createElement("button");
    upB.textContent = "▲";
    var lab = document.createElement("div");
    lab.className = "oct-label";
    var dnB = document.createElement("button");
    dnB.textContent = "▼";
    ctrl.appendChild(upB); ctrl.appendChild(lab); ctrl.appendChild(dnB);
    row.el.appendChild(ctrl);
    function updateLabel() { lab.textContent = "C" + (Math.floor(row.base / 12) - 1); }
    upB.addEventListener("click", function () { if (row.base + 12 <= 96) { row.base += 12; updateLabel(); } });
    dnB.addEventListener("click", function () { if (row.base - 12 >= 24) { row.base -= 12; updateLabel(); } });
    updateLabel();

    var keys = document.createElement("div");
    keys.className = "keys";
    row.el.appendChild(keys);
    /* 흰 건반 7개 */
    WHITE_OFF.forEach(function (off, i) {
      var k = document.createElement("div");
      k.className = "wkey";
      var nm = document.createElement("div");
      nm.className = "kname";
      nm.textContent = WNAMES[i];
      k.appendChild(nm);
      keys.appendChild(k);
      bindKey(k, function () { return row.base + off; });
    });
    /* 검은 건반 5개 */
    BLACK_POS.forEach(function (bp) {
      var k = document.createElement("div");
      k.className = "bkey";
      k.style.left = "calc(" + ((bp.after + 1) * 100 / 7) + "% - 4.3%)";
      keys.appendChild(k);
      bindKey(k, function () { return row.base + bp.off; });
    });
  }
  rows.forEach(buildRow);

  /* ════════ 이벤트 ════════ */
  recBtn.addEventListener("click", toggleRec);
  document.getElementById("saveBtn").addEventListener("click", saveAbc);
  document.getElementById("copyBtn").addEventListener("click", copyAbc);
  document.getElementById("clearBtn").addEventListener("click", clearRec);
  document.body.addEventListener("touchmove", function (e) {
    if (e.target.closest && e.target.closest("#keyboard")) e.preventDefault();
  }, { passive: false });
})();
</script>
</body>
</html>
